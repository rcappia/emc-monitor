<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}EMC Monitor{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/style.css?v=5" rel="stylesheet">

  <!-- Aplica o tema antes de renderizar para evitar piscar -->
  <script>
    (function () {
      var saved = localStorage.getItem('emc-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>

<!-- ── Barra mobile (aparece só no celular) ──── -->
<div class="mobile-header">
  <button class="hamburger" id="menuToggle" aria-label="Abrir menu">
    <i class="bi bi-list"></i>
  </button>
  <a href="/" class="mobile-header-brand">
    <i class="bi bi-broadcast-pin"></i>
    EMC Monitor
  </a>
</div>

<!-- ── Overlay escuro (mobile) ──── -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="app-layout">

  <!-- ── Sidebar ─────────────────────────────── -->
  <aside class="sidebar" id="sidebar">

    <a href="/" class="sidebar-brand">
      <i class="bi bi-broadcast-pin"></i>
      EMC Monitor
    </a>

    <nav class="sidebar-nav">
      <div class="sidebar-label">Menu</div>

      <a href="/" class="sidebar-link {% if request.url.path == '/' %}active{% endif %}">
        <i class="bi bi-speedometer2"></i>
        Dashboard
      </a>

      <a href="/clientes/" class="sidebar-link {% if '/clientes' in request.url.path %}active{% endif %}">
        <i class="bi bi-people"></i>
        Clientes
      </a>

      <a href="/alertas/" class="sidebar-link {% if '/alertas' in request.url.path %}active{% endif %}">
        <i class="bi bi-bell"></i>
        Alertas do DOU
      </a>

      <a href="/configuracoes/" class="sidebar-link {% if '/configuracoes' in request.url.path %}active{% endif %}">
        <i class="bi bi-gear"></i>
        Configurações
      </a>
    </nav>

    {% if usuario_atual %}
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <i class="bi bi-person-circle"></i>
        {{ usuario_atual.nome.split()[0] }}
      </div>
      <div class="d-flex align-items-center gap-2">
        <button class="theme-toggle" id="themeToggle" title="Alternar modo claro/escuro">
          <i class="bi bi-moon-fill" id="themeIcon"></i>
        </button>
        <a href="/logout" class="sidebar-logout">
          <i class="bi bi-box-arrow-right"></i>Sair
        </a>
      </div>
    </div>
    {% endif %}

  </aside>
  <!-- ── Fim sidebar ──────────────────────────── -->

  <!-- ── Conteúdo principal ──────────────────── -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // ── Menu mobile ──────────────────────────────
  var menuBtn   = document.getElementById('menuToggle');
  var sidebar   = document.getElementById('sidebar');
  var overlay   = document.getElementById('sidebarOverlay');

  function openMenu()  { sidebar.classList.add('open');    overlay.classList.add('active'); }
  function closeMenu()  { sidebar.classList.remove('open'); overlay.classList.remove('active'); }

  if (menuBtn) menuBtn.addEventListener('click', function () {
    sidebar.classList.contains('open') ? closeMenu() : openMenu();
  });
  if (overlay) overlay.addEventListener('click', closeMenu);

  // Fecha menu ao clicar em um link (mobile)
  sidebar.querySelectorAll('.sidebar-link').forEach(function (link) {
    link.addEventListener('click', closeMenu);
  });

  // ── Gerenciamento de tema ─────────────────────
  var html = document.documentElement;
  var btn  = document.getElementById('themeToggle');
  var icon = document.getElementById('themeIcon');

  function applyTheme(theme) {
    html.setAttribute('data-theme', theme);
    localStorage.setItem('emc-theme', theme);
    if (icon) icon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
  }

  // Aplica ícone correto ao carregar
  var currentTheme = html.getAttribute('data-theme') || 'light';
  if (icon) icon.className = currentTheme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';

  // Toggle ao clicar
  if (btn) btn.addEventListener('click', function () {
    var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    applyTheme(next);
  });

  // Reage a mudanças na preferência do sistema
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
    if (!localStorage.getItem('emc-theme')) applyTheme(e.matches ? 'dark' : 'light');
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}EMC Monitor{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark navbar-expand-lg" style="background:#003087;">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-broadcast-pin me-2"></i>EMC Monitor
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/monitorados' in request.url.path %}active{% endif %}" href="/monitorados/">
            <i class="bi bi-search me-1"></i>Monitorados
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/alertas' in request.url.path %}active{% endif %}" href="/alertas/">
            <i class="bi bi-bell me-1"></i>Alertas DOU
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/configuracoes' in request.url.path %}active{% endif %}" href="/configuracoes/">
            <i class="bi bi-gear me-1"></i>Configurações
          </a>
        </li>
      </ul>
      {% if usuario_atual %}
      <div class="d-flex align-items-center gap-2 ms-3">
        <span class="text-white-50 small">
          <i class="bi bi-person-circle me-1"></i>{{ usuario_atual.nome.split()[0] }}
        </span>
        <a href="/logout" class="btn btn-sm btn-outline-light">Sair</a>
      </div>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container-fluid py-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

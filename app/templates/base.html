<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}EMC Monitor{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/style.css" rel="stylesheet">
</head>
<body>

<div class="app-layout">

  <!-- ── Sidebar ─────────────────────────────── -->
  <aside class="sidebar">

    <a href="/" class="sidebar-brand">
      <i class="bi bi-broadcast-pin"></i>
      EMC Monitor
    </a>

    <nav class="sidebar-nav">
      <div class="sidebar-label">Menu</div>

      <a href="/" class="sidebar-link {% if request.url.path == '/' %}active{% endif %}">
        <i class="bi bi-speedometer2"></i>
        Dashboard
      </a>

      <a href="/monitorados/" class="sidebar-link {% if '/monitorados' in request.url.path %}active{% endif %}">
        <i class="bi bi-search"></i>
        Clientes monitorados
      </a>

      <a href="/alertas/" class="sidebar-link {% if '/alertas' in request.url.path %}active{% endif %}">
        <i class="bi bi-bell"></i>
        Alertas do DOU
      </a>

      <a href="/configuracoes/" class="sidebar-link {% if '/configuracoes' in request.url.path %}active{% endif %}">
        <i class="bi bi-gear"></i>
        Configurações
      </a>
    </nav>

    {% if usuario_atual %}
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <i class="bi bi-person-circle"></i>
        {{ usuario_atual.nome.split()[0] }}
      </div>
      <a href="/logout" class="sidebar-logout">
        <i class="bi bi-box-arrow-right"></i>Sair
      </a>
    </div>
    {% endif %}

  </aside>
  <!-- ── Fim sidebar ──────────────────────────── -->

  <!-- ── Conteúdo principal ──────────────────── -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

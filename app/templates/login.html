<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — EMC Monitor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; }
    .login-card {
      max-width: 420px; margin: 80px auto;
      border-radius: 12px; border: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .login-header {
      background: #003087; color: white;
      border-radius: 12px 12px 0 0;
      padding: 28px 32px 20px;
    }
  </style>
</head>
<body>
  <div class="login-card card">
    <div class="login-header">
      <div class="d-flex align-items-center gap-2 mb-1">
        <i class="bi bi-broadcast-pin fs-4"></i>
        <span class="fw-bold fs-5">EMC Monitor</span>
      </div>
      <p class="mb-0 opacity-75 small">Radiodifusão — Sistema de Monitoramento</p>
    </div>
    <div class="card-body p-4">
      <h6 class="fw-semibold mb-4">Entrar na sua conta</h6>

      {% if erro %}
      <div class="alert alert-danger py-2 small">
        <i class="bi bi-exclamation-circle me-1"></i>{{ erro }}
      </div>
      {% endif %}

      <form method="post" action="/login">
        <input type="hidden" name="proximo" value="{{ proximo }}">
        <div class="mb-3">
          <label class="form-label fw-medium small">E-mail</label>
          <input type="email" name="email" class="form-control"
            placeholder="seu@emcprojetos.com.br" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label fw-medium small">Senha</label>
          <input type="password" name="senha" class="form-control"
            placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-medium">
          <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
        </button>
      </form>

      <p class="text-muted text-center small mt-3 mb-0">
        Problemas de acesso? Fale com a administradora.
      </p>
    </div>
  </div>
</body>
</html>

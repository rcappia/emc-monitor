<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar — EMC Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f1f5f9;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 16px;
    }
    .login-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      overflow: hidden;
    }
    .login-top {
      background: #0f172a;
      padding: 28px 32px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .login-top i {
      color: #16a34a;
      font-size: 26px;
    }
    .login-top-text h1 {
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      margin: 0 0 2px;
    }
    .login-top-text p {
      color: rgba(255,255,255,.5);
      font-size: 12.5px;
      margin: 0;
    }
    .login-body {
      padding: 28px 32px 32px;
    }
    .login-body h2 {
      font-size: 15px;
      font-weight: 600;
      color: #0f172a;
      margin: 0 0 22px;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #0f172a;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    .field input:focus {
      border-color: #16a34a;
      box-shadow: 0 0 0 3px rgba(22,163,74,.12);
    }
    .btn-login {
      width: 100%;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .btn-login:hover { background: #15803d; }
    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 7px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .login-help {
      text-align: center;
      color: #94a3b8;
      font-size: 12px;
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">

      <div class="login-top">
        <i class="bi bi-broadcast-pin"></i>
        <div class="login-top-text">
          <h1>EMC Monitor</h1>
          <p>Sistema de monitoramento do DOU</p>
        </div>
      </div>

      <div class="login-body">
        <h2>Entre com sua conta</h2>

        {% if erro %}
        <div class="error-box">
          <i class="bi bi-exclamation-circle-fill"></i>
          {{ erro }}
        </div>
        {% endif %}

        <form method="post" action="/login">
          <input type="hidden" name="proximo" value="{{ proximo }}">

          <div class="field">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email"
              placeholder="seu@emcprojetos.com.br" required autofocus>
          </div>

          <div class="field">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha"
              placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn-login">
            <i class="bi bi-box-arrow-in-right"></i>
            Entrar
          </button>
        </form>

        <p class="login-help">Problemas de acesso? Fale com a administradora.</p>
      </div>

    </div>
  </div>
</body>
</html>
